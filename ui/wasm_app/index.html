<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Correlation — browser-based structural analysis for atomistic simulations. Zero-install preview powered by WebAssembly.">
    <title>Correlation — Web Analysis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>Correlation <span class="version">3.0</span></h1>
        <p class="subtitle">Structural Analysis Engine — WebAssembly Preview</p>
    </header>

    <main class="app-main">
        <!-- File upload panel -->
        <section class="panel upload-panel" id="upload-panel">
            <h2>Load Structure</h2>
            <div class="drop-zone" id="drop-zone">
                <p>Drag &amp; drop a structure file here</p>
                <p class="hint">or click to browse (.xyz, .car, .pdb, .gro, .cif, …)</p>
                <input type="file" id="file-input" accept=".xyz,.exyz,.car,.arc,.cif,.cell,.pdb,.gro,.dump,.lammpstrj,.poscar,.contcar,.xdatcar,.vasp,.md,.dat,.outmol,.inp,.restart,.out" hidden>
            </div>
            <div id="file-info" class="file-info hidden"></div>
        </section>

        <!-- Analysis controls -->
        <section class="panel controls-panel hidden" id="controls-panel">
            <h2>Analysis Settings</h2>
            <div class="control-group">
                <label for="r-max">r<sub>max</sub> (Å)</label>
                <input type="number" id="r-max" value="20.0" min="1" step="0.5">
            </div>
            <div class="control-group">
                <label for="bin-width">Bin width (Å)</label>
                <input type="number" id="bin-width" value="0.05" min="0.001" step="0.01">
            </div>
            <button class="btn-primary" id="run-btn" disabled>Run Analysis</button>
            <div id="status" class="status"></div>
        </section>

        <!-- Results -->
        <section class="panel results-panel hidden" id="results-panel">
            <h2>Results</h2>
            <div class="plot-controls">
                <label for="plot-select">Distribution:</label>
                <select id="plot-select"></select>
                <label for="partial-select">Partial:</label>
                <select id="partial-select"></select>
            </div>
            <canvas id="plot-canvas" width="900" height="500"></canvas>
        </section>
    </main>

    <footer class="app-footer">
        <p>&copy; 2013–2026 Isaías Rodríguez &middot; MIT License &middot;
            <a href="https://github.com/Isurwars/Correlation" target="_blank">GitHub</a>
        </p>
    </footer>

    <script src="correlation_wasm.js"></script>
    <script src="app.js"></script>
</body>
</html>
