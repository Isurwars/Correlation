name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libtbb-dev libhdf5-dev build-essential cmake pkg-config libfontconfig-dev libfreetype6-dev libexpat1-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build Correlation
        run: cmake --build build --config Release

      - name: Package Release
        run: |
          cd build
          cpack -G DEB
          cpack -G TGZ

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Correlation-*-Linux.deb
            build/Correlation-*-Linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Correlation
        run: cmake --build build --config Release --parallel

      - name: Create Installer
        run: |
          cd build
          cpack -G NSIS

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/Correlation-*-win64.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ninja tbb hdf5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build Correlation
        run: cmake --build build --config Release

      - name: Package Release
        run: |
          cd build
          cpack -G DragNDrop

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/Correlation-*-macOS.dmg

  publish-aur:
    name: Publish to AUR
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update PKGBUILD version and checksum
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}" # Remove 'v' prefix if present

          # Download the source tarball to compute sha256
          wget "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.event.release.tag_name }}.tar.gz" -O source.tar.gz
          SHA256=$(sha256sum source.tar.gz | awk '{print $1}')

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA256')/" aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: correlation
          pkgbuild: aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.event.release.tag_name }}"
