name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libtbb-dev libhdf5-dev build-essential cmake pkg-config libfontconfig-dev libfreetype6-dev libexpat1-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build correlation
        run: cmake --build build --config Release

      - name: Package Release
        run: |
          cd build
          cpack -G DEB
          cpack -G TGZ

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/correlation-*-Linux.deb
            build/correlation-*-Linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build correlation
        run: cmake --build build --config Release --parallel

      - name: Create Installer
        run: |
          cd build
          cpack -G NSIS

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/correlation-*-win64.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install ninja tbb hdf5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build correlation
        run: cmake --build build --config Release

      - name: Package Release
        run: |
          cd build
          cpack -G DragNDrop

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/correlation-*-macOS.dmg

  publish-aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set version
        run: |
          # Strip leading 'v' if present
          VERSION="${{ github.ref_name }}"
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Update PKGBUILD
        run: |
          sed -i "s/pkgver=.*/pkgver=${{ env.VERSION }}/" PKGBUILD
          # The source URL in PKGBUILD also needs the correct version
          # (though it usually uses ${pkgver})

      - name: Update Checksums
        run: |
          # Fetch the source tarball to compute checksum
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${{ env.VERSION }}.tar.gz"
          curl -L "$URL" -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | cut -d ' ' -f 1)
          sed -i "s/sha256sums=.*/sha256sums=('$SHA256')/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          # We need an Arch environment to use makepkg --printsrcinfo
          docker run --rm -v $PWD:/pkg archlinux /bin/bash -c "
            pacman -Sy --noconfirm base-devel-minimal
            cd /pkg
            # We need a non-root user for makepkg
            useradd -m builder
            chown -R builder:builder .
            su builder -c 'makepkg --printsrcinfo' > .SRCINFO
          "

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: correlation
          pkgbuild: ./PKGBUILD
          commit_username: ${{ github.actor }}
          commit_email: ${{ github.actor }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release v${{ env.VERSION }}"
