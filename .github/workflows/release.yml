name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fuzz:
    name: Fuzz Testing (Ubuntu, Clang)
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build libtbb-dev libhdf5-dev build-essential cmake pkg-config libfftw3-dev

      - name: Configure CMake
        run: |
          cmake -B build-fuzz -S . -DCMAKE_BUILD_TYPE=Release -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DBUILD_FUZZ_TESTS=ON \
            -DBUILD_GUI=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build Fuzz Targets
        run: cmake --build build-fuzz --config Release --parallel

      - name: Run Fuzz Smoke Tests
        run: cd build-fuzz && ctest -L fuzz --output-on-failure

  build-linux:
    name: Build Linux
    needs: [fuzz]
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IDLE_TIMEOUT: "0"
      SCCACHE_RETRY_DELAY: "2"
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libtbb-dev libhdf5-dev build-essential cmake pkg-config libfontconfig-dev libfreetype6-dev libexpat1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-x11-0 xvfb rpm libgtk-3-dev libfftw3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Configure CMake
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DBUILD_WITH_HDF5=ON \
            -DBUILD_WITH_ARROW=ON

      - name: Build correlation
        run: cmake --build build --config Release --parallel

      - name: Test
        run: cd build && xvfb-run ctest --output-on-failure

      - name: Verify Shared Linking
        run: |
          ldd build/src/correlation
          if ! ldd build/src/correlation | grep -q "libnfd"; then
            echo "ERROR: libnfd was NOT dynamically linked as required!"
            exit 1
          fi
          echo "Success: NFD is verified as a shared library dependency."

      - name: Package Release
        run: |
          cd build
          cpack

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/correlation-*-Linux.deb
            build/correlation-*-Linux.rpm
            build/correlation-*-Linux.tar.gz

  build-windows:
    name: Build Windows
    needs: [fuzz]
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IDLE_TIMEOUT: "0"
      SCCACHE_RETRY_DELAY: "2"
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
          key: cargo-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Configure CMake
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DBUILD_WITH_HDF5=ON `
            -DBUILD_WITH_ARROW=ON

      - name: Build correlation
        run: cmake --build build --config Release --parallel

      - name: Pre-Package Diagnostics
        shell: bash
        run: |
          cd build
          ls -la *.dll || true

      - name: Create Installer
        shell: pwsh
        run: |
          Set-Location build
          # Give the build a moment to release all file handles
          Start-Sleep -Seconds 3
          # Run CPack directly to ensure logs are captured by GitHub Actions
          cpack -G NSIS --verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Error "CPack NSIS failed (exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: build/correlation-*-win64.exe

  build-macos:
    name: Build macOS
    needs: [fuzz]
    runs-on: macos-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IDLE_TIMEOUT: "0"
      SCCACHE_RETRY_DELAY: "2"
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies
        run: brew install ninja tbb hdf5 llvm@18 fftw

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-macos-

      - name: Configure CMake
        run: |
          export CC="$(brew --prefix llvm@18)/bin/clang"
          export CXX="$(brew --prefix llvm@18)/bin/clang++"
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DBUILD_WITH_HDF5=ON \
            -DBUILD_WITH_ARROW=ON

      - name: Build correlation
        run: cmake --build build --config Release --parallel

      - name: Test
        run: cd build && ctest --output-on-failure

      - name: Verify Bundle Dependencies
        run: |
          # Perform a temporary test installation
          cmake --install build --prefix $PWD/install_test

          # Inspect linked libraries of the GUI and CLI binaries
          echo "==== Executable Library Dependencies ===="
          otool -L install_test/bin/correlation
          otool -L install_test/bin/correlation-cli

          # Assert that TBB and HDF5 are not referenced at absolute paths
          if otool -L install_test/bin/correlation | grep -E "(/opt/homebrew|/usr/local/Cellar|/usr/local/lib/libtbb|/usr/local/lib/libhdf5)"; then
            echo "ERROR: GUI executable still references absolute external library paths!"
            exit 1
          fi
          if otool -L install_test/bin/correlation-cli | grep -E "(/opt/homebrew|/usr/local/Cellar|/usr/local/lib/libtbb|/usr/local/lib/libhdf5)"; then
            echo "ERROR: CLI executable still references absolute external library paths!"
            exit 1
          fi
          echo "Success: macOS dependencies are successfully bundled and paths updated!"

      - name: Package Release
        run: |
          cd build
          # Brief pause to ensure the build releases all file handles on macOS
          sleep 15
          cpack -G DragNDrop

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: build/correlation-*-macOS.dmg

  build-docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-doxygen-${{ runner.os }}-${{ hashFiles('docs/Doxyfile.in') }}
          restore-keys: apt-doxygen-${{ runner.os }}-

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Build Doxygen documentation
        run: |
          # Extract version from CMakeLists.txt and substitute Doxyfile.in template vars
          VERSION=$(grep -oP '(?<=VERSION )\d+\.\d+\.\d+' CMakeLists.txt | head -1)
          sed \
            -e "s|@PROJECT_VERSION@|${VERSION}|g" \
            -e "s|@CMAKE_CURRENT_BINARY_DIR@|${GITHUB_WORKSPACE}/build|g" \
            -e "s|@PROJECT_SOURCE_DIR@|${GITHUB_WORKSPACE}|g" \
            docs/Doxyfile.in > /tmp/Doxyfile.ci
          echo "WARN_AS_ERROR = YES" >> /tmp/Doxyfile.ci
          mkdir -p "${GITHUB_WORKSPACE}/build/docs"
          doxygen /tmp/Doxyfile.ci

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/docs/html

  publish-aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set version
        run: |
          # Strip leading 'v' if present
          VERSION="${{ github.ref_name }}"
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Update PKGBUILD
        run: |
          sed -i "s/pkgver=.*/pkgver=${{ env.VERSION }}/" packaging/PKGBUILD
          # The source URL in PKGBUILD also needs the correct version
          # (though it usually uses ${pkgver})

      - name: Update Checksums
        run: |
          # Fetch the source tarball to compute checksum
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${{ env.VERSION }}.tar.gz"
          curl -L "$URL" -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | cut -d ' ' -f 1)
          sed -i "s/sha256sums=.*/sha256sums=('$SHA256')/" packaging/PKGBUILD

      - name: Generate .SRCINFO
        timeout-minutes: 10
        run: |
          # We need an Arch environment to use makepkg --printsrcinfo
          docker run --rm \
            --network host \
            -v "$PWD/packaging:/pkg" \
            archlinux /bin/bash -euo pipefail -c '
              pacman -Sy --noconfirm base-devel 1>&2
              useradd -m builder
              chown -R builder:builder /pkg
              cd /pkg
              su builder -c "makepkg --printsrcinfo" > /pkg/.SRCINFO
            '

      - name: Publish to AUR
        timeout-minutes: 5
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          # Configure SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            StrictHostKeyChecking no
          EOF

          # Configure git identity
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          # Clone the AUR package repo and push updated files
          git clone ssh://aur@aur.archlinux.org/correlation.git /tmp/aur-correlation
          cp packaging/PKGBUILD /tmp/aur-correlation/PKGBUILD
          cp packaging/.SRCINFO /tmp/aur-correlation/.SRCINFO
          cd /tmp/aur-correlation
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Release v${{ env.VERSION }}"
          git push

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.21.3

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # On macOS, build universal2 and native arm64/x86_64 slices
          CIBW_ARCHS_MACOS: "x86_64 arm64 universal2"
          # Build x86_64 and aarch64 on Linux
          CIBW_ARCHS_LINUX: "x86_64 aarch64"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/correlation-analysis
    permissions:
      id-token: write # Crucial for Trusted Publishing (OIDC)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
