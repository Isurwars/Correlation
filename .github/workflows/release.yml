name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libtbb-dev libhdf5-dev build-essential cmake pkg-config libfontconfig-dev libfreetype6-dev libexpat1-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build Correlation
        run: cmake --build build --config Release

      - name: Package Release
        run: |
          cd build
          cpack -G DEB
          cpack -G TGZ

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Correlation-*-Linux.deb
            build/Correlation-*-Linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Correlation
        run: cmake --build build --config Release --parallel

      - name: Create Installer
        run: |
          cd build
          cpack -G NSIS

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/Correlation-*-win64.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ninja tbb hdf5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build Correlation
        run: cmake --build build --config Release

      - name: Package Release
        run: |
          cd build
          cpack -G DragNDrop

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/Correlation-*-macOS.dmg
