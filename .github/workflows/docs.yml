name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'include/**'
      - 'src/**'
      - 'docs/**'
      - 'CMakeLists.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ninja-build libtbb-dev libhdf5-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF

      - name: Build Documentation
        run: cmake --build build --target doxygen

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The Doxyfile.in sets OUTPUT_DIRECTORY to @CMAKE_CURRENT_BINARY_DIR@/docs
          # and HTML_OUTPUT to html, so the output is in build/docs/html
          path: build/docs/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
