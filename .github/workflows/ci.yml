name: CI Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libtbb-dev libhdf5-dev build-essential cmake pkg-config libfontconfig-dev libfreetype6-dev libexpat1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-x11-0 xvfb libgtk-3-dev libfftw3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install tbb hdf5 llvm@18 fftw

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        if: runner.os == 'Windows'
        with:
          arch: x64

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            export CC="$(brew --prefix llvm@18)/bin/clang"
            export CXX="$(brew --prefix llvm@18)/bin/clang++"
            export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja \
              -DCMAKE_OSX_SYSROOT="$SDKROOT" \
              -DCMAKE_C_COMPILER_LAUNCHER=sccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          else
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja \
              -DCMAKE_C_COMPILER_LAUNCHER=sccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          fi

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: cd build && xvfb-run ctest --output-on-failure

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: cd build && ctest --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: cd build && ctest -C Release --output-on-failure -E PythonBindings

  fuzz:
    name: Fuzz Testing (Ubuntu, Clang)
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build libtbb-dev libhdf5-dev build-essential cmake pkg-config libfftw3-dev

      - name: Configure CMake
        run: |
          cmake -B build-fuzz -S . -DCMAKE_BUILD_TYPE=Release -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DBUILD_FUZZ_TESTS=ON \
            -DBUILD_GUI=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build Fuzz Targets
        run: cmake --build build-fuzz --config Release --parallel

      - name: Run Fuzz Smoke Tests
        run: cd build-fuzz && ctest -L fuzz --output-on-failure

