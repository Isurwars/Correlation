name: CI Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtbb-dev libhdf5-dev build-essential cmake pkg-config libfontconfig-dev libfreetype6-dev libexpat1-dev libxcb-shape0-dev libxcb-xfixes0-dev xvfb

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install tbb hdf5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j 2

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: cd build && xvfb-run ctest --output-on-failure

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: cd build && ctest --output-on-failure
