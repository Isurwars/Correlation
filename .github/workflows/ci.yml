name: CI Build

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_IDLE_TIMEOUT: "0"
  SCCACHE_RETRY_DELAY: "2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_BINARY_SOURCES: "clear;gha,readwrite"
  VCPKG_FORCE_SYSTEM_BINARIES: 1

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build build-essential cmake pkg-config libfontconfig-dev libfreetype6-dev libexpat1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-x11-0 xvfb

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
          vcpkgDirectory: ${{ github.workspace }}/vcpkg

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~\.cargo\registry
            ~\.cargo\git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DFETCHCONTENT_TRY_FIND_PACKAGE_MODE=ALWAYS \
            -DARROW_DEPENDENCY_SOURCE=SYSTEM \
            -DSLINT_BUILD_COMPILER=OFF

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DFETCHCONTENT_TRY_FIND_PACKAGE_MODE=ALWAYS `
            -DARROW_DEPENDENCY_SOURCE=SYSTEM `
            -DSLINT_BUILD_COMPILER=OFF

      - name: Build
        env:
          RUSTC_WRAPPER: sccache
        run: cmake --build build --config Release --parallel

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: cd build && xvfb-run ctest --output-on-failure

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: cd build && ctest --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: cd build && ctest -C Release --output-on-failure -E PythonBindings
